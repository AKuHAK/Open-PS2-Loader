# Use 'generic' to be able to override CC/CXX for clang
language: generic

# Use a release with a longer normal LTS
dist: xenial

services:
  - docker

env:
  global:
   # The next declaration is the encrypted COVERITY_SCAN_TOKEN, created
   #   via the "travis encrypt" command using the project repo's public key
   - secure: ""

#before_install:
#  - echo -n | openssl s_client -connect https://scan.coverity.com:443 | sed -ne '/-BEGIN CERTIFICATE-/,/-END CERTIFICATE-/p' | sudo tee -a /etc/ssl/certs/ca-

addons:
  apt:
    packages:
      - libsdl2-dev
      - libusb-1.0-0-dev
      - qtbase5-dev
      - qtdeclarative5-dev
      - rake
    sources:
      - ubuntu-toolchain-r-test
      - llvm-toolchain-xenial
  coverity_scan:
    project:
      name: "AKuHAK/Open-PS2-Loader"
      description: "test"
    notification_email: akuhak@gmail.com
    build_command_prepend: "<Your build preprocessing command here>"
    build_command: "docker run -it --rm -v ps2dev/ps2dev:latest make install"
    branch_pattern: coverity_scan
