name: CI-compile

on:
  push:
  pull_request:
  repository_dispatch:
    types: [run_build]

jobs:
  build:
    runs-on: ubuntu-latest
    container: ps2dev/ps2dev:latest
    steps:
    - name: Install dependencies
      run: apk add build-base git zip gawk

    - name: git checkout
      uses: actions/checkout@v2

    - name: Compile -> make clean release
      run: make --trace clean release

    - name: Create detailed changelog
      run: sh ./make_changelog.sh

    - name: Upload release artifact ELF
      if: ${{ success() }}
      uses: actions/upload-artifact@v2
      with:
        name: OPNPS2LD
        path: OPNPS2LD-*.ELF

    - name: Upload release artifact info
      if: ${{ success() }}
      uses: actions/upload-artifact@v2
      with:
        name: INFO
        path: |
          DETAILED_CHANGELOG
          CREDITS
          LICENSE
          README.md

  build-variants:
    strategy:
      fail-fast: false
      matrix:
        rtl: ["", RTL=1]
        pademu: ["", PADEMU=1]
        igs: ["", IGS=1]
        t10k: ["", DTL_T10000=1]
        debug: [""] ["", DEBUG=1]
        docker: ['ps2dev', 'fjtrujy']
    runs-on: ubuntu-latest
    container: ${{ matrix.docker }}/ps2dev:latest
    steps:
    - name: Install dependencies
      run: |
        apk add build-base git
        wget -O ${PS2SDK}/samples/Makefile.iopglobal https://raw.githubusercontent.com/ps2dev/ps2sdk/master/samples/Makefile.iopglobal_sample

    - name: git checkout
      uses: actions/checkout@v2

    - name: Get version
      id: version
      run: echo "::set-output name=version::$(make oplversion)"

    - name: Set up environment
      if: matrix.docker == 'fjtrujy'
      run: |
        echo "IOP_TOOL_PREFIX=mipsel-ps2-irx-" >> $GITHUB_ENV
        echo "IOP_PREFIX=mipsel-ps2-irx-" >> $GITHUB_ENV

    - name: Compile -> make ${{ matrix.t10k }} ${{ matrix.igs }} ${{ matrix.pademu }} ${{ matrix.rtl }} NOT_PACKED=1
      run: |
        make --trace ${{ matrix.t10k }} ${{ matrix.igs }} ${{ matrix.pademu }} ${{ matrix.rtl }} ${{ matrix.debug }} NOT_PACKED=1
        mv opl.elf OPNPS2LD-${{ steps.version.outputs.version }}-${{ matrix.t10k }}-${{ matrix.igs }}-${{ matrix.pademu }}-${{ matrix.rtl }}-${{ matrix.debug }}.ELF

    - name: Create detailed changelog
      run: sh ./make_changelog.sh

    - name: Upload variants artifact ELF
      if: ${{ success() }}
      uses: actions/upload-artifact@v2
      with:
        name: OPNPS2LD-VARIANTS-${{ matrix.docker }}
        path: OPNPS2LD*.ELF

  release:
    needs: [build, build-variants]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/master'
    steps:
    - name: git checkout
      uses: actions/checkout@v2
    - run: git fetch --prune --unshallow

    - name: Get version
      id: version
      run: echo "::set-output name=version::$(make oplversion)"

    - name: Download release artifact
      uses: actions/download-artifact@v1
      with:
        name: OPNPS2LD

    - name: Download variants artifact
      uses: actions/download-artifact@v1
      with:
        name: OPNPS2LD-VARIANTS

    - name: Download info artifact
      uses: actions/download-artifact@v1
      with:
        name: INFO

    - name: Prepare artifacts for release
      run: |
        cp INFO/* OPNPS2LD/
        cp INFO/* OPNPS2LD-VARIANTS/
        7z a -t7z OPNPS2LD-${{ steps.version.outputs.version }}.7z OPNPS2LD/*
        7z a -t7z OPNPS2LD-VARIANTS-${{ steps.version.outputs.version }}.7z OPNPS2LD-VARIANTS/*

    - name: Create prerelease
      if: github.ref == 'refs/heads/master'
      uses: marvinpinto/action-automatic-releases@latest
      with:
        repo_token: "${{ secrets.GITHUB_TOKEN }}"
        prerelease: true
        automatic_release_tag: "latest"
        title: "${{ steps.version.outputs.version }}"
        files: |
          OPNPS2LD-${{ steps.version.outputs.version }}.7z
          OPNPS2LD-VARIANTS-${{ steps.version.outputs.version }}.7z

    - name: Create release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: marvinpinto/action-automatic-releases@latest
      with:
        repo_token: "${{ secrets.GITHUB_TOKEN }}"
        prerelease: "${{ contains(github.ref, '-rc') }}"
        title: "${{ steps.version.outputs.version }}"
        files: |
          OPNPS2LD-${{ steps.version.outputs.version }}.7z
          OPNPS2LD-VARIANTS-${{ steps.version.outputs.version }}.7z
