name: coverity-scan

on:
  push:
  pull_request:
  repository_dispatch:
    types: [run_build]

jobs:
  build:
    runs-on: ubuntu-latest
    container: ps2dev/ps2dev:latest
    steps:
    - name: Install dependencies
      run: |
        apk add build-base git zip ruby

    - uses: actions/checkout@v2
    - run: |
        git fetch --prune --unshallow

    - name: Checkout ruby/ruby
      run: |
        git clone --depth=1 https://github.com/ruby/ruby

    - name: Download Coverity Build Tool
      run: |
        wget -q https://scan.coverity.com/download/cxx/linux64 --post-data "token=$TOKEN&project=ruby" -O cov-analysis-linux64.tar.gz
        mkdir cov-analysis-linux64
        tar xzf cov-analysis-linux64.tar.gz --strip 1 -C cov-analysis-linux64
      env:
        TOKEN: ${{ secrets.COVERITY_SCAN_TOKEN }}

    - name: Fixed world writable dirs
      run: |
        chmod go-w $HOME
        sudo chmod -R go-w /usr/share

    - name: Compile -> make clean release
      run: |
        make clean release

    - name: Build with cov-build
      run: |
        export PATH=`pwd`/cov-analysis-linux64/bin:$PATH
        cov-build --dir cov-int make

    - name: Submit the result to Coverity Scan
      run: |
        tar czvf ruby.tgz cov-int
        curl \
          --form project=ruby \
          --form token=$TOKEN \
          --form email=mame@ruby-lang.org \
          --form file=@ruby.tgz \
          --form version=trunk \
          --form description="`./ruby -v`" \
          https://scan.coverity.com/builds?project=ruby
      env:
        TOKEN: ${{ secrets.COVERITY_SCAN_TOKEN }}
